<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepDive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="topbar">
      <div class="pill">Distance: <span id="distance">0</span>m</div>
      <div class="pill">Pearls: <span id="pearls">0</span></div>
      <div class="pill">
        HP: 
        <div class="hp-container"><div class="hp-bar" id="hpBar"></div></div>
      </div>
    </div>
  </div>

  <div class="center" id="menuScreen">
    <div class="card">
      <h1>Deep Dive</h1>
      <p>Use WASD or Arrows to swim.</p>
      <p><b>Shift</b> to Dash | <b>Ctrl</b> to Shrink</p>
      <div class="btnrow">
        <button id="startBtn">START GAME</button>
      </div>
    </div>
  </div>

  <div class="center hide" id="gameOverScreen">
    <div class="card">
      <h1>GAME OVER</h1>
      <p>Distance: <strong id="finalDistance">0</strong>m</p>
      <p>Pearls: <strong id="finalPearls">0</strong></p>
      <div class="btnrow">
        <button id="restartBtn">PLAY AGAIN</button>
      </div>
    </div>
  </div>
  <script src="js/utils.js"></script>
  <script src="js/control.js"></script>
  <script src="js/fish.js"></script>
  <script src="js/backgound.js"></script>
  <script src="js/obstacles.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
