<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepDive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="topbar">
      <div class="pill">Distance: <span id="distance">0</span>m</div>
      <div class="pill">Pearls: <span id="pearls">0</span><span id="multiplier" style="color:#ffdb4d; font-size:12px; margin-left:4px;">x1</span></div>
      <div class="pill" id="stageIndicator" style="color:#a3f0ff;">Open Sea</div>
      <div class="pill">
        HP: 
        <div class="hp-container"><div class="hp-bar" id="hpBar"></div></div>
      </div>
      <div class="buffs">
        <div class=" buff-shield" id="iconShield">🛡️</div>
      </div>
    </div>
  </div>

  <div class="center" id="menuScreen">
    <div class="card">
      <h1>DeepCaves</h1>
      <p>Enjoy a long swim in the beautiful open sea before journeying into the treacherous cave system.</p>
      <div class="hint-grid">
        <div><strong>Move</strong> WASD / Arrows</div>
        <div><strong>Dash</strong> Shift / Space</div>
        <div><strong>Shrink</strong> Ctrl / X</div>
      </div>
      <div class="btnrow"><button id="startBtn">Dive In</button></div>
    </div>
  </div>

  <div class="center hide" id="gameOverScreen">
    <div class="card">
      <h1>Game Over</h1>
      <p style="font-size: 20px; color: white; margin: 5px 0;">Distance: <strong id="finalDistance" style="color: #49c7ff;">0</strong>m</p>
      <p style="font-size: 20px; color: white; margin: 5px 0 20px;">Pearls: <strong id="finalPearls" style="color: #49c7ff;">0</strong></p>
      <div class="btnrow"><button id="restartBtn">Try Again</button></div>
    </div>
  </div>
  <script src="js/utils.js"></script>
  <script src="js/control.js"></script>
  <script src="js/fish.js"></script>
  <script src="js/backgound.js"></script>
  <script src="js/obstacles.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
